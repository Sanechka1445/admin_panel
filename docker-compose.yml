version: "3.9"

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: colorshapes
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: colorshapes
      APP_PORT: "8080"
      BACKUP_DIR: /app/dbBackup
    volumes:
      - backup_data:/app/dbBackup
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  backup_data:
