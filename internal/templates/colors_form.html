{{define "colors_form.html"}}
{{template "base" .}}
<div class="page-header">
  <h1>{{.Title}}</h1>
  <a href="/colors" class="btn btn-ghost">← Назад</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Название</label>
      <input type="text" name="name" value="{{if .Data}}{{.Data.Name}}{{end}}" required placeholder="Красный">
    </div>
    <div class="form-group">
      <label>HEX-цвет</label>
      <input type="color" name="hex" value="{{if .Data}}{{.Data.Hex}}{{else}}#6c63ff{{end}}">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="/colors" class="btn btn-ghost">Отмена</a>
    </div>
  </form>
</div>
{{end}}
