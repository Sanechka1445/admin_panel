{{define "colors_list.html"}}
{{template "base" .}}
<div class="page-header">
  <h1>Цвета</h1>
  <a href="/colors/new" class="btn btn-primary">+ Добавить</a>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Цвет</th>
        <th>Название</th>
        <th>HEX</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody>
      {{range .Data}}
      <tr>
        <td>{{.ID}}</td>
        <td><span class="swatch" style="background:{{.Hex}}"></span></td>
        <td>{{.Name}}</td>
        <td><code>{{.Hex}}</code></td>
        <td>
          <a href="/colors/{{.ID}}/edit" class="btn btn-ghost btn-sm">Изменить</a>
          <form class="inline-form" method="POST" action="/colors/{{.ID}}/delete"
                onsubmit="return confirm('Удалить цвет «{{.Name}}»?')">
            <button class="btn btn-danger btn-sm">Удалить</button>
          </form>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="5" class="empty-state" style="text-align:center;padding:24px">Нет цветов</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
