{{define "login.html"}}<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ColorShapes Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --accent: #6c63ff;
      --text: #e2e8f0; --muted: #7c8496; --border: #2d3148;
      --red: #f87171; --surface2: #22263a;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .logo span { color: #ff6b6b; }
    .subtitle { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .825rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%; padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .error {
      background: rgba(248,113,113,.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 9px 14px;
      border-radius: 8px;
      font-size: .875rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">Color<span>Shapes</span></div>
  <div class="subtitle">Административная панель</div>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="admin@admin.ru" required autofocus>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
</div>
</body>
</html>{{end}}
