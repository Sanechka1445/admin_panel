{{define "shapes_form.html"}}
{{template "base" .}}
<div class="page-header">
  <h1>{{.Title}}</h1>
  <a href="/shapes" class="btn btn-ghost">← Назад</a>
</div>
<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label>Название фигуры</label>
      <input type="text" name="name"
        value="{{with .Data}}{{with .Shape}}{{.Name}}{{end}}{{end}}"
        required placeholder="Круг">
    </div>
    <div class="form-group">
      <label>Цвет</label>
      <select name="color_id" required>
        <option value="">— выберите цвет —</option>
        {{$selectedID := 0}}
        {{with .Data}}{{with .Shape}}{{$selectedID = .ColorID}}{{end}}{{end}}
        {{with .Data}}
          {{range .Colors}}
          <option value="{{.ID}}" {{if eq .ID $selectedID}}selected{{end}}>
            {{.Name}} ({{.Hex}})
          </option>
          {{end}}
        {{end}}
      </select>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="/shapes" class="btn btn-ghost">Отмена</a>
    </div>
  </form>
</div>
{{end}}
