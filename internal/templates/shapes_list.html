{{define "shapes_list.html"}}
{{template "base" .}}
<div class="page-header">
  <h1>Фигуры</h1>
  <a href="/shapes/new" class="btn btn-primary">+ Добавить</a>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Название</th>
        <th>Цвет</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody>
      {{range .Data}}
      <tr>
        <td>{{.ID}}</td>
        <td>{{.Name}}</td>
        <td>
          {{if .Color}}
          <span class="swatch" style="background:{{.Color.Hex}}"></span>
          {{.Color.Name}}
          {{end}}
        </td>
        <td>
          <a href="/shapes/{{.ID}}/edit" class="btn btn-ghost btn-sm">Изменить</a>
          <form class="inline-form" method="POST" action="/shapes/{{.ID}}/delete"
                onsubmit="return confirm('Удалить фигуру «{{.Name}}»?')">
            <button class="btn btn-danger btn-sm">Удалить</button>
          </form>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="4" class="empty-state" style="text-align:center;padding:24px">Нет фигур</td></tr>
      {{end}}
    </tbody>
  </table>
</div>
{{end}}
